<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>五張命盤，一張人生地圖</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Noto+Sans+TC:wght@200;300;400&display=swap" rel="stylesheet">
<style>
:root{
  --void:#000000; --pitch:#0A0806;
  --bone:#DED6C4; --brite:#F0E7D2;
  --gold:#C2A059; --pale:#E0CB93; --coffee:#9C7B4E; --wine:#8A4A3C;
  --ash:#8A8175; --faint:#332B22;
  --serif:'Noto Serif TC',"Songti TC","SimSun",serif;
  --sans:'Noto Sans TC',"PingFang TC","Microsoft JhengHei",sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--void);color:var(--bone);font-family:var(--sans);font-weight:300;
  line-height:1.95;font-size:16px;letter-spacing:.03em;overflow-x:hidden;min-height:100vh}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none}
.wrap{max-width:940px;margin:0 auto;padding:0 22px}

/* ---------- 進入畫面 ---------- */
#gate{position:relative;z-index:1;min-height:100svh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:56px 22px 70px}
.hero{text-align:center;margin-bottom:50px}
.astro{width:min(88vw,460px);height:auto;margin-bottom:10px}
h1.main{font-family:var(--serif);font-weight:400;font-size:clamp(21px,5vw,30px);
  letter-spacing:.18em;line-height:1.75;margin-bottom:18px;color:var(--brite)}
p.sub{font-size:13.5px;color:var(--ash);letter-spacing:.08em;line-height:1.95;
  max-width:34ch;margin:0 auto}
p.priv{font-size:12px;color:var(--faint);letter-spacing:.06em;margin-top:18px}

form{width:min(100%,460px);border:1px solid var(--faint);background:rgba(8,8,10,.72);
  backdrop-filter:blur(6px);padding:28px 24px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:16px}
.f{display:flex;flex-direction:column;gap:8px}
.f.full{grid-column:1/-1}
label{font-family:var(--mono);font-size:10px;letter-spacing:.22em;color:var(--coffee)}
input,select{background:rgba(0,0,0,.6);border:1px solid var(--faint);color:var(--bone);
  padding:11px 12px;font-family:var(--mono);font-size:15px;border-radius:0;width:100%}
select{appearance:none;background-image:linear-gradient(45deg,transparent 50%,#8A8175 50%),
  linear-gradient(135deg,#8A8175 50%,transparent 50%);
  background-position:calc(100% - 16px) 50%,calc(100% - 11px) 50%;
  background-size:5px 5px,5px 5px;background-repeat:no-repeat;padding-right:32px}
input::placeholder{color:#6B6458;opacity:1;letter-spacing:.04em}
input:focus,select:focus{outline:none;border-color:var(--gold)}
input,select{color:var(--brite)}
:focus-visible{outline:1px solid var(--gold);outline-offset:2px}
.hint{font-size:12px;color:var(--ash);line-height:1.8;margin-top:4px}
button.go{width:100%;margin-top:16px;background:none;color:var(--gold);
  border:1px solid var(--gold);padding:14px;font-family:var(--serif);font-weight:400;
  font-size:15px;letter-spacing:.44em;text-indent:.44em;cursor:pointer;transition:.25s}
button.go:hover{background:rgba(194,160,89,.12)}
.err{color:var(--wine);font-size:12.5px;margin-top:12px;display:none;font-family:var(--mono)}

/* ---------- 應用 ---------- */
#app{display:none;position:relative;z-index:1}
header.bar{position:sticky;top:0;z-index:50;background:rgba(0,0,0,.9);
  backdrop-filter:blur(14px);border-bottom:1px solid var(--faint)}
.bar-in{display:flex;align-items:center;gap:16px;padding:12px 22px;max-width:940px;margin:0 auto}
.who{font-family:var(--mono);font-size:10.5px;color:var(--ash);flex:1;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.05em}
.reset{background:none;border:1px solid var(--faint);color:var(--ash);font-family:var(--mono);
  font-size:10px;letter-spacing:.14em;padding:7px 12px;cursor:pointer;white-space:nowrap}
.reset:hover{border-color:var(--ash);color:var(--bone)}
nav.tabs{border-top:1px solid var(--faint);overflow-x:auto;scrollbar-width:none;
  -webkit-overflow-scrolling:touch}
nav.tabs::-webkit-scrollbar{display:none}
nav.tabs .in{display:flex;max-width:940px;margin:0 auto;padding:0 12px}
.tab{flex:1;min-width:88px;background:none;border:none;border-bottom:1px solid transparent;
  color:var(--ash);font-family:var(--sans);font-weight:300;font-size:12.5px;letter-spacing:.08em;
  padding:12px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;
  white-space:nowrap;transition:.2s}
.tab svg{opacity:.55}
.tab[aria-selected="true"]{color:var(--gold);border-bottom-color:var(--gold)}
.tab[aria-selected="true"] svg{opacity:1}
main{padding:44px 0 100px}
section.panel{display:none}
section.panel.on{display:block;animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}

.chap{border-left:1px solid var(--faint);padding-left:24px;margin-bottom:44px;max-width:62ch}
.chap .n{font-family:var(--mono);font-size:10px;letter-spacing:.28em;color:var(--coffee);
  display:block;margin-bottom:9px}
.chap h2{font-family:var(--serif);font-weight:400;font-size:21px;letter-spacing:.14em;
  margin-bottom:19px;color:var(--brite)}
.chap p{font-size:15.5px;line-height:2.05;color:#CFC8B8;margin-bottom:15px}
.chap p:last-child{margin-bottom:0}

.card{border:1px solid var(--faint);background:var(--pitch);padding:22px 20px;margin-bottom:24px}
.card h3{font-family:var(--serif);font-weight:400;font-size:14px;letter-spacing:.2em;
  color:var(--gold);margin-bottom:16px}
.kv{display:grid;grid-template-columns:auto 1fr;gap:9px 20px;font-family:var(--mono);font-size:13px}
.kv dt{color:var(--ash);letter-spacing:.1em}
.kv dd{color:var(--bone)}
table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12.5px}
th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--faint)}
th{color:var(--coffee);font-weight:400;font-size:10px;letter-spacing:.2em}
td{color:#CFC8B8}
tr.cur td{color:var(--gold)}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.chart-box{display:flex;justify-content:center;margin-bottom:22px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;padding-bottom:4px}
.chart-box svg{max-width:100%;height:auto}
.legend{display:flex;flex-wrap:wrap;gap:16px;font-family:var(--mono);font-size:10.5px;
  color:var(--ash);margin:-8px 0 24px;letter-spacing:.1em}
.lu{color:var(--gold)}.quan{color:var(--pale)}.ke{color:var(--bone)}.ji{color:var(--wine)}
.note{font-size:12.5px;color:var(--ash);line-height:1.9;border-top:1px solid var(--faint);
  padding-top:20px;margin-top:34px;max-width:62ch}
@media(prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<canvas id="stars"></canvas>

<div id="gate">
  <div class="hero">
    <svg class="astro" viewBox="0 0 640 640" aria-hidden="true" id="astro"></svg>
    <h1 class="main">五張命盤，一張人生地圖</h1>
    <p class="sub">同一個出生時刻，八字、紫微、西洋、吠陀、人類圖的交叉分析</p>
    <p class="priv">所有計算在你的瀏覽器完成，出生資料不會離開這台裝置</p>
  </div>
  <form id="form" autocomplete="off">
    <div class="frow">
      <div class="f"><label for="fy">出生年</label><input type="number" id="fy" min="1900" max="2099" placeholder="ex : 2000" required></div>

      <div class="f"><label for="fdd">日</label><input type="number" id="fdd" min="1" max="31" placeholder="ex : 01" required></div>

      <div class="f full"><label for="city">出生地</label><select id="city">
        <option value="8|25.03|121.57" selected>台北　UTC+8</option>
        <option value="8|22.32|114.17">香港　UTC+8</option>
        <option value="8|25.11|121.44">新北　UTC+8</option>

        <option value="0|51.51|-0.13">倫敦　UTC+0</option>
        <option value="1|48.86|2.35">巴黎　UTC+1</option>
        <option value="1|52.52|13.40">柏林　UTC+1</option>
        <option value="-5|40.71|-74.01">紐約　UTC-5</option>
        <option value="-8|34.05|-118.24">洛杉磯　UTC-8</option>
        <option value="-8|49.28|-123.12">溫哥華　UTC-8</option>
        <option value="10|-33.87|151.21">雪梨　UTC+10</option>
        <option value="10|-37.81|144.96">墨爾本　UTC+10</option>
        <option value="custom">其他（自行輸入座標與時區）</option>
      </select></div>
      <div class="f"><label for="lat">緯度</label><input type="number" id="lat" step="0.01" value="25.03" required></div>
      <div class="f"><label for="lon">經度</label><input type="number" id="lon" step="0.01" value="121.57" required></div>
      <div class="f full" id="tzrow" style="display:none"><label for="tz">時區（UTC 偏移）</label><input type="number" id="tz" step="0.5" value="8" required></div>
    </div>
    <p class="hint">選出生地會自動帶入座標與時區。出生時間填當地時鐘上看到的時間，差半小時就可能改變命宮與上升，不確定的話可分別試算比對。若出生當地當時實施日光節約時間，請選「其他」並把時區減一小時。</p>
    <button class="go" type="submit">排盤</button>
    <p class="err" id="err"></p>
  </form>
</div>

<div id="app">
<header class="bar">
  <div class="bar-in">
    <span class="who" id="who"></span>
    <button class="reset" id="reset">重新輸入</button>

      <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1"><circle cx="10" cy="10" r="7.5"/><circle cx="10" cy="10" r="3.5"/><circle cx="10" cy="2.5" r="1.2" fill="currentColor" stroke="none"/></svg>綜合分析</button>

<main class="wrap">

</main>
</div>

  const dasha = currentDasha(R.vimshottari, nowJd);
  const dy = currentDayun(bz, R.dayun, new Date().getFullYear(), birth.y);
  const sec = {};

  const mingStars = starsIn(zw, '命');
  const dmWx = st.dmWx;
  const tgList = bz.pillars.map(([g], i) => i === 2 ? null : FC.tenGod(bz.dayMaster, g)).filter(Boolean);

  // 一、命格總論
  {
    const p = [];
    p.push(`八字是${bz.year} ${bz.month} ${bz.day} ${bz.hour}，日主${bz.dayMaster}${dmWx}，生於${bz.monthZhi}月。整體判為${st.level}。${st.level.includes('強') ? '白話說，你的自我意志強、行動力足，做事憑一股勁推到底，但也容易過剛，缺少自然的煞車。' : '白話說，你對環境敏感，需要借力才能發揮，順風時走得遠，逆風時消耗大，找到對的環境比硬撐重要。'}`);
    if (miss.length) {
      const roleMap = { 水:'冷卻與約束', 火:'熱情與動能', 木:'生發與彈性', 金:'決斷與規則', 土:'穩定與承載' };
      p.push(`全局缺${miss.join('、')}。${miss.map(m => `缺${m}代表你天生少了${roleMap[m]}這一塊`).join('，')}。這不是能力的缺口，是結構的缺口，一輩子都會用各種方式在補它，補得好就是特色，補不好就是消耗。`);
    }
    const traits = mingStars.stars.map(s => `${s}（${STAR_TRAIT[s]}）`).join('、');
    p.push(`紫微命宮在${FC.ZHI[zw.ming]}，${mingStars.borrowed ? `本宮無主星，借對宮的${traits}來看。空宮坐命的人，人生特別容易被環境塑形，換一個環境就換一種活法，這既是彈性也是漂移。` : `坐${traits}。`}身宮落在${zw.palaceName[zw.shen]}宮，代表你後天最用心經營、也最能靠努力改變的領域在這裡。`);
    if (pat.shaPoLang) p.push('命財官三方構成殺破狼格局。這個格局的定義就是變動：人生以十年為單位大破大立，不換跑道就換環境，不換環境就換活法。安穩對這種命不是報酬，是慢性中毒。');
    else if (pat.jiYueTongLiang) p.push('命財官三方近機月同梁格局。這是相對安定的結構，適合有制度、有累積、靠專業長期沉澱的路，急轉彎反而傷元氣。');
    else if (pat.ziFuXiang) p.push('命財官三方見紫府相，格局氣度較大，適合站在有規模的平台上，位置越正式，你越能發揮。');
    p.push(`西洋盤看，太陽在${signOf(R.western['太陽'])}、月亮在${signOf(R.western['月亮'])}、上升在${signOf(R.western['上升'])}。外人第一眼看到的是${SIGN_TRAIT[signOf(R.western['上升'])]}的你；內在真正需要的是${SIGN_TRAIT[signOf(R.western['月亮'])]}；而核心的自我認同是${SIGN_TRAIT[signOf(R.western['太陽'])]}。這三層若差距大，你的日常就是在演一個跟內裡不太一樣的人。`);
    p.push(`人類圖是${hd.type}，內在權威${hd.authority}，人生角色${hd.profile}。${AUTH_TEXT[hd.authority] || ''}`);
    sec['命格總論'] = p;
  }

  // 二、事業
  {
    const p = [];
    const guan = starsIn(zw, '官祿');
    p.push(`官祿宮在${FC.ZHI[guan.idx]}，${guan.borrowed ? '本宮無主星，借對宮' : '坐'}${guan.stars.map(s => `${s}（${STAR_TRAIT[s]}）`).join('、') || '無主星'}。${careerFromStars(guan.stars)}`);
    if (pat.shaPoLang) p.push('殺破狼的事業節奏是階段性的：一段時間累積、然後主動打破、再重建。你的履歷不會是一條平滑上升的線，而是幾次跳躍。這不是不穩定，這是你的機制，看懂了就不必為每次變動內疚。');
    const hasGuanSha = tgList.some(t => t === '正官' || t === '七殺');
    if (!hasGuanSha) p.push('八字天干不見官殺。官殺是規範與約束，天干不透代表你對權威沒有天然的敬畏，不接受密集管理。有授權的位置會讓你發光，被層層盯著的位置會讓你枯萎，而且枯萎得比別人快。');
    else p.push(`八字見${tgList.filter(t => t === '正官' || t === '七殺').join('、')}，代表你與體制、責任、上位者之間有實質的連結，能承擔也需要承擔，位置上的名分對你比一般人重要。`);
    if (sh['忌'].palace === '官祿') p.push('年干化忌落官祿宮，事業是你一生要反覆面對的功課，容易投入很深卻回報得慢，也容易在同一類問題上重複卡關。這不代表做不成，代表要接受它的節奏比別人慢熱。');
    if (sh['祿'].palace === '官祿' || sh['權'].palace === '官祿') p.push(`年干化${sh['祿'].palace === '官祿' ? '祿' : '權'}落官祿宮，事業宮帶著${sh['祿'].palace === '官祿' ? '資源與順遂' : '掌控與力量'}，這是全盤的加分項，職涯上你比多數人容易拿到實權或實利。`);
    if (dasha) p.push(`吠陀大運目前走${FC.DASHA_CN[dasha.md.lord]}期（${jdYear(dasha.md.start)} 至 ${jdYear(dasha.md.end)}），其中小運在${FC.DASHA_CN[dasha.ad.lord]}期（${jdYear(dasha.ad.start)} 至 ${jdYear(dasha.ad.end)}）。${DASHA_CAREER[dasha.md.lord] || ''}`);
    if (dy.pillar) p.push(`八字大運目前走${dy.pillar}（約 ${dy.from} 至 ${dy.to} 年）。${dayunFlavor(dy.pillar, ug)}`);
    p.push(`操作準則：你是${hd.authority}權威。${AUTH_ACTION[hd.authority] || ''}`);
    sec['事業'] = p;
  }

  // 三、財務
  {
    const p = [];
    const cai = starsIn(zw, '財帛');
    p.push(`財帛宮在${FC.ZHI[cai.idx]}，${cai.borrowed ? '借對宮' : '坐'}${cai.stars.map(s => `${s}`).join('、') || '無主星'}。${moneyFromStars(cai.stars)}`);
    const caiGods = tgList.filter(t => t === '正財' || t === '偏財');
    if (caiGods.length) p.push(`八字天干透${caiGods.join('、')}，代表你與金錢的關係是直接而有實感的，錢對你不只是數字，是安全感的一部分。${st.level.includes('強') ? '身強能任財，你有能力賺，問題通常不在收入端。' : '身弱財多則為財所困，容易被錢的壓力推著走，量力比擴張重要。'}`);
    else p.push('八字天干不透財星，你對錢的態度偏向工具性而非目標性，賺錢的動機往往來自別的東西（成就、自由、審美），錢是副產品。');
    const jieCai = tgList.filter(t => t === '比肩' || t === '劫財');
    if (jieCai.length) p.push(`天干見${jieCai.join('、')}，這是分財的結構。你的錢容易從人際關係的縫隙漏掉：借出去的、合夥的、代墊的、為感情花的。財務上最該守的一條線不是節儉，是不與人共財。`);
    if (sh['忌'].palace === '財帛') p.push('化忌入財帛，財務上有長期的糾結感，錢的問題容易反覆，也容易在同一個地方重複漏。建議把財務結構做得越簡單越好，複雜的安排對你不利。');
    const fude = starsIn(zw, '福德');
    p.push(`福德宮在${FC.ZHI[fude.idx]}，${fude.borrowed ? '借對宮' : '坐'}${fude.stars.join('、') || '無主星'}，這一宮管的是你的精神消費與生活品質。${zw.shen === fude.idx ? '身宮就落在這裡，代表你這輩子真正在經營的不是頭銜，是生活的質地與內在秩序。你會把錢花在讓生活變好的地方，這不是揮霍，是你的配置，戒不掉也不必戒，該做的是圈預算而不是禁止。' : ''}`);
    p.push('財務的通則：對這張盤而言，解法是自動化而不是節儉。收入一進來先切一塊到不方便動用的地方，剩下的才是可支配。靠意志力省錢，長期一定輸。');
    sec['財務'] = p;
  }

  // 四、感情
  {
    const p = [];
    const fu = starsIn(zw, '夫妻');
    p.push(`夫妻宮在${FC.ZHI[fu.idx]}，${fu.borrowed ? '本宮無主星，借對宮' : '坐'}${fu.stars.map(s => `${s}（${STAR_TRAIT[s]}）`).join('、') || '無主星'}。${loveFromStars(fu.stars, fu.borrowed)}`);
    const isFemale = birth.gender === 'F';
    const guanSha = tgList.filter(t => t === '正官' || t === '七殺');
    const caiXing = tgList.filter(t => t === '正財' || t === '偏財');
    if (isFemale) {
      if (!guanSha.length) p.push('女命八字天干不見官殺。官星是夫星也是約束，天干不透的人在關係裡不接受被管，也不接受依附，要的是並肩而非照顧。感情不太會照世俗的時間表走，晚成往往比早成穩。');
      else p.push(`女命天干見${guanSha.join('、')}，夫星到位，代表關係在你人生裡是有實質分量的一塊，你也願意為關係承擔責任。`);
    } else {
      if (!caiXing.length) p.push('男命八字天干不見財星。財星是妻星，天干不透代表感情的顯化偏內斂或偏晚，關係的建立需要你主動走出去，不會自己送上門。');
      else p.push(`男命天干見${caiXing.join('、')}，妻星明現，感情機會不缺，要留意的是選擇的品質而非數量。`);
    }
    const dayZhi = bz.pillars[2][1];
    p.push(`日支${dayZhi}是你的夫妻宮位。${FC.ZHI_WX[dayZhi] === dmWx ? '日支與日主同氣，等於婚姻宮裡住著另一個你自己。兩個相似而都強的人在一起，不是很好就是很累，沒有中間值。' : `日支${FC.ZHI_WX[dayZhi]}與日主${dmWx}互動，代表伴侶帶來的能量與你本質不同，這是互補也是磨合，關鍵在能不能欣賞差異。`}`);
    if (sh['忌'].palace === '夫妻') p.push('年干化忌落夫妻宮，感情是這張盤上的重點課題。容易投入深、放手難、對關係反覆懷疑。不是註定不順，是這一塊需要你比別人更有意識地經營與溝通。');
    if (sh['祿'].palace === '夫妻') p.push('年干化祿落夫妻宮，這是很好的配置，伴侶能帶給你實質的資源與情感的滋養，關係本身會是你人生的助力。');
    if (hd.channels.some(c => (c[0] === 37 && c[1] === 40) || (c[0] === 40 && c[1] === 37))) p.push('人類圖有 37-40 交易通道，你在親密關係裡天生講究付出與回報的對等。這不是計較，是你的迴路。關係裡的約定要講清楚，模糊的犧牲會讓你默默記帳，然後某天全部攤開。');
    sec['感情'] = p;
  }

  // 五、家庭與人際
  {
    const p = [];
    const tian = starsIn(zw, '田宅'), fumu = starsIn(zw, '父母'), xiong = starsIn(zw, '兄弟'), jiao = starsIn(zw, '交友');
    p.push(`田宅宮在${FC.ZHI[tian.idx]}，${tian.borrowed ? '借對宮' : '坐'}${tian.stars.join('、') || '無主星'}。這一宮管家宅、不動產、以及原生家庭的空間感。${sh['忌'].palace === '田宅' ? '化忌落此，家宅或不動產相關的事是長期課題，可能顯化為家人健康、房產糾葛或居住的不安定。置產宜晚不宜早，且產權細節要自己逐條看過。' : '整體而言家宅這塊相對平順，可作為你的後盾。'}`);
    p.push(`父母宮${fumu.stars.join('、') || '無主星'}，兄弟宮${xiong.stars.join('、') || '無主星'}。${sh['忌'].palace === '父母' ? '化忌落父母宮，與長輩的溝通是慢磨型的，關心常以嘮叨或意見的形式出現，講道理沒有用，報平安比解釋有效。也要留意長輩健康。' : '與長輩的關係整體可經營，衝突多來自表達方式而非根本立場。'}`);
    p.push(`交友宮${jiao.stars.join('、') || '無主星'}。${friendFromStars(jiao.stars)}`);
    if (!hd.centers.includes('Head')) p.push('人類圖頭腦中心空白：別人的問題與焦慮你會不自覺接住，然後在深夜想著不屬於你的事。職場上這會變成你替別人揹工作。學會分辨「這是誰的問題」，是你人際上最划算的一項修煉。');
    if (!hd.centers.includes('Throat')) p.push('喉嚨中心空白：你不是隨時都能表達的人，說話的時機需要等待。被逼著當場表態時你容易說出不是真心的話，給自己「我回去想一下」的權利很重要。');
    if (!hd.centers.includes('G')) p.push('G 中心空白：你的方向感與身分認同會隨環境流動，待在對的地方、跟對的人，你就是對的人。所以選環境對你而言不是小事，是根本。');
    sec['家庭與人際'] = p;
  }

  // 六、健康
  {
    const p = [];
    const w = st.weighted;
    const maxWx = Object.keys(w).reduce((a, b) => w[a] > w[b] ? a : b);
    const minWx = Object.keys(w).reduce((a, b) => w[a] < w[b] ? a : b);
    const ORGAN = { 木:'肝膽、筋、眼睛與情緒的疏泄', 火:'心血管、血壓、睡眠與發炎反應',
      土:'脾胃、消化、肌肉與思慮過度', 金:'肺、呼吸道、皮膚與大腸', 水:'腎、泌尿、生殖與骨骼' };
    p.push(`五行分布上，${maxWx}最旺、${minWx}最弱。過旺的一行容易亢進，過弱的一行容易失養。以你的結構，最需要長期留意的是${ORGAN[maxWx]}（因${maxWx}旺易亢），以及${ORGAN[minWx]}（因${minWx}弱易虛）。`);
    if (miss.length) p.push(`全局缺${miss.join('、')}，對應的${miss.map(m => ORGAN[m]).join('；')}這幾塊，建議當成年度必檢的項目，不要等有症狀才看。`);
    const ji = starsIn(zw, '疾厄');
    p.push(`紫微疾厄宮${ji.borrowed ? '借對宮' : '坐'}${ji.stars.join('、') || '無主星'}，可作為上述判斷的補充參考。`);
    if (!hd.centers.includes('Spleen')) p.push('人類圖脾中心空白：你對身體的警訊有感覺，但常用意志力蓋過去，該休息時硬撐，該離開時多留很久。這不是紀律好，是空白脾中心的典型失衡。');
    if (!hd.centers.includes('Root')) p.push('根部中心空白：你容易被時間壓力驅動，感覺永遠有事沒做完。分辨「這個急迫是我的還是外面給的」，能省下大量無謂的腎上腺素。');
    if (hd.centers.includes('SolarPlexus')) p.push('情緒中心有定義：你的情緒有自己的週期，高低起伏是機制不是問題。重要的事不要在浪頭上決定，等平面浮現。');
    const tiao = ['巳','午','未'].includes(bz.monthZhi) ? '你生於盛夏，命局偏燥，水是你的調候用神。多喝水、靠近水域、冬季進補，對你不只是養生，是實質的補運。'
      : ['亥','子','丑'].includes(bz.monthZhi) ? '你生於嚴冬，命局偏寒，火是你的調候用神。保暖、曬太陽、溫熱飲食、規律運動生陽，對你是實質的補運。' : '';
    if (tiao) p.push(tiao);
    sec['健康'] = p;
  }

  // 七、人生節奏
  {
    const p = [];
    if (dy.pillar) p.push(`八字大運：目前走${dy.pillar}（約 ${dy.from} 至 ${dy.to} 年），下一步${R.dayun.runs[dy.idx + 1] || '—'}。${dayunFlavor(dy.pillar, ug)}`);
    if (dasha) {
      p.push(`吠陀大運：${FC.DASHA_CN[dasha.md.lord]}期 ${jdYear(dasha.md.start)} 至 ${jdYear(dasha.md.end)}，共 ${FC.DASHA_YEARS[dasha.md.lord]} 年。目前小運 ${FC.DASHA_CN[dasha.ad.lord]}期，至 ${jdYear(dasha.ad.end)} 轉換。${DASHA_CAREER[dasha.md.lord] || ''}`);
      const nx = R.vimshottari.seq.find(s => s.start > nowJd);
      if (nx) p.push(`下一個大運是${FC.DASHA_CN[nx.lord]}期，${jdYear(nx.start)} 開始。大運交接前後兩年通常是人生換檔期，會有明顯的環境或角色變化。`);
    }
    const prof = hd.profile;
    p.push(`人類圖 ${prof} 的人生劇本：${PROFILE_TEXT[prof] || '前期試錯、中期整合、後期成為他人的參照，這是通則。'}`);
    p.push('把幾套時間系統疊起來看，如果多套同時指向轉折，那個判斷就可靠；若各說各話，代表這段時間的地形本來就模糊，適合觀察而非重注。');
    sec['人生節奏'] = p;
  }

  // 八、三句
  {
    const p = [];
    p.push(`第一，${pat.shaPoLang ? '你的命是變動型的，安穩對你是慢性中毒。不要把穩定當人生目標，那個目標會把你悶死。' : st.level.includes('強') ? '你的意志力是你最大的資產也是最大的風險，該收的時候要收。' : '你需要對的環境勝過需要更多的努力，選環境就是選命運。'}`);
    p.push(`第二，${miss.length ? `你這輩子都在補${miss.join('、')}這一塊，補的方式決定了你的高度。` : '你的五行俱全，這是難得的平衡，但也代表沒有特別強的偏才，靠的是持續而不是爆發。'}`);
    p.push(`第三，你是${hd.authority}權威。${AUTH_ACTION[hd.authority] || ''}這一條規則能救你很多次。`);
    sec['如果只能記三句'] = p;
  }

  return { sections: sec, meta: { st, ug, miss, pat, sh, dasha, dy, mingStars } };
}

const AUTH_TEXT = {
  情緒:'你沒有當下的清明，真相要等情緒的波過去才浮現。這是機制，不是缺點。',
  薦骨:'你的身體比頭腦誠實，對當下的提問會有即時的回應，那個回應才是真的。',

  d.innerHTML='<filter id="'+id+'" x="-140%" y="-140%" width="380%" height="380%">'+
    '<feGaussianBlur stdDeviation="'+sd+'" result="b"/><feMerge><feMergeNode in="b"/>'+
    '<feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
  return d;
}

const ZW_POS={5:[0,0],6:[1,0],7:[2,0],8:[3,0],4:[0,1],9:[3,1],3:[0,2],10:[3,2],2:[0,3],1:[1,3],0:[2,3],11:[3,3]};
function drawZiwei(R){
  const W=440,cell=W/4;
  const s=E('svg',{viewBox:'0 0 '+W+' '+W,width:W,role:'img','aria-label':'紫微命盤'});
  s.appendChild(glowDefs('zg',2.2));
  const zw=R.ziwei,lu=zw.sihua[0],quan=zw.sihua[1],ke=zw.sihua[2],ji=zw.sihua[3];
  const sh={};sh[lu]='祿';sh[quan]='權';sh[ke]='科';sh[ji]='忌';
  const shC={'祿':GOLD,'權':PALE,'科':BONE,'忌':WINE};
  for(const k in ZW_POS){
    const i=Number(k),cx=ZW_POS[k][0],cy=ZW_POS[k][1],x=cx*cell,y=cy*cell;
    const isMing=i===zw.ming,isShen=i===zw.shen;
    s.appendChild(E('rect',{x,y,width:cell,height:cell,
      fill:isMing?'rgba(194,160,89,.07)':'none',
      stroke:isMing?GOLD:FAINT,'stroke-width':isMing?1.2:.6}));
    const pn=E('text',{x:x+9,y:y+21,fill:isMing?GOLD:ASH,'font-size':13,
      'font-family':"'Noto Serif TC',serif",'letter-spacing':'.1em'});
    pn.textContent=zw.palaceName[i]+(zw.palaceName[i]==='命'?'宮':'');
    s.appendChild(pn);
    if(isShen){const b=E('text',{x:x+cell-9,y:y+21,fill:COFFEE,'font-size':11,
      'text-anchor':'end','font-family':'monospace','letter-spacing':'.14em'});
      b.textContent='身宮';s.appendChild(b);}
    const stars=zw.palaceStars[i]||[];
    stars.forEach(function(st,k2){
      const t=E('text',{x:x+9,y:y+45+k2*21,fill:isMing?BRITE:BONE,'font-size':16,
        'font-family':"'Noto Serif TC',serif",'letter-spacing':'.06em'});
      if(isMing)t.setAttribute('filter','url(#zg)');
      t.textContent=st;s.appendChild(t);
      if(sh[st]){
        const g=E('text',{x:x+9+st.length*17+4,y:y+45+k2*21,fill:shC[sh[st]],
          'font-size':12,'font-family':"'Noto Serif TC',serif"});
        g.textContent=sh[st];s.appendChild(g);
      }
    });
    if(!stars.length){
      const t=E('text',{x:x+9,y:y+45,fill:FAINT,'font-size':14});
      t.textContent='—';s.appendChild(t);
    }
    const z=E('text',{x:x+cell-9,y:y+cell-10,fill:FAINT,'font-size':15,'text-anchor':'end',
      'font-family':"'Noto Serif TC',serif"});
    z.textContent=FateCalc.ZHI[i];s.appendChild(z);
  }
  s.appendChild(E('rect',{x:cell,y:cell,width:cell*2,height:cell*2,fill:'none',
    stroke:FAINT,'stroke-width':.6}));
  const mid=cell*2;
  [[R.bazi.year+'　'+R.bazi.month+'　'+R.bazi.day+'　'+R.bazi.hour,-30,BONE,15],
   ['農曆 '+R.lunar.lunarMonth+' 月 '+R.lunar.lunarDay+' 日　'+R.bazi.hourZhi+'時',-4,ASH,12.5],
   [zw.nayin+zw.ju+'局　命宮 '+zw.mingGan+zw.mingZhi,22,ASH,12.5]].forEach(function(o){
    const t=E('text',{x:mid,y:mid+o[1],fill:o[2],'font-size':o[3],'text-anchor':'middle',
      'font-family':"'Noto Serif TC',serif",'letter-spacing':'.1em'});
    t.textContent=o[0];s.appendChild(t);
  });
  [[lu,'祿'],[quan,'權'],[ke,'科'],[ji,'忌']].forEach(function(o,idx){
    const t=E('text',{x:cell+16+idx*(cell*2-32)/4,y:mid+52,fill:shC[o[1]],'font-size':12,
      'font-family':"'Noto Serif TC',serif"});
    t.textContent=o[0]+o[1];s.appendChild(t);
  });
  return s;
}

function drawWheel(chart){
  const S=460,cx=S/2,cy=S/2,R1=213,R2=181,R3=144,R4=108;
  const s=E('svg',{viewBox:'0 0 '+S+' '+S,width:S,role:'img','aria-label':'西洋星盤'});
  s.appendChild(glowDefs('wg',2.6));
  const asc=chart['上升'];
  const ang=function(l){return ((l-asc)*Math.PI/180)+Math.PI;};
  const px=function(l,r){return [cx+r*Math.cos(ang(l)),cy-r*Math.sin(ang(l))];};
  [R1,R2,R3,R4].forEach(function(r,i){s.appendChild(E('circle',{cx,cy,r,fill:'none',
    stroke:BONE,'stroke-width':.6,opacity:.3-i*.04}));});
  s.appendChild(E('circle',{cx,cy,r:222,fill:'none',stroke:GOLD,'stroke-width':1.3,
    'stroke-dasharray':'1 6','stroke-linecap':'round',opacity:.7}));
  s.appendChild(E('circle',{cx,cy,r:163,fill:'none',stroke:BONE,'stroke-width':1.1,
    'stroke-dasharray':'1 5','stroke-linecap':'round',opacity:.3}));
  const gl=['♈','♉','♊','♋','♌','♍','♎','♏','♐','♑','♒','♓'];
  for(let i=0;i<12;i++){
    const p1=px(i*30,R2),p2=px(i*30,R1);
    s.appendChild(E('line',{x1:p1[0],y1:p1[1],x2:p2[0],y2:p2[1],stroke:BONE,'stroke-width':.5,opacity:.3}));
    const g=px(i*30+15,(R1+R2)/2);
    const t=E('text',{x:g[0],y:g[1],fill:ASH,'font-size':16,'text-anchor':'middle','dominant-baseline':'central'});
    t.textContent=gl[i];s.appendChild(t);
  }
  for(let d=0;d<360;d+=5){
    const p1=px(d,R2),p2=px(d,d%10===0?R2-8:R2-5);
    s.appendChild(E('line',{x1:p1[0],y1:p1[1],x2:p2[0],y2:p2[1],stroke:BONE,'stroke-width':.45,opacity:.24}));
  }
  for(let i=0;i<12;i++){
    const p1=px(asc+i*30,R4),p2=px(asc+i*30,R3);
    s.appendChild(E('line',{x1:p1[0],y1:p1[1],x2:p2[0],y2:p2[1],stroke:FAINT,'stroke-width':.6}));
    const nn=px(asc+i*30+15,R4+16);
    const t=E('text',{x:nn[0],y:nn[1],fill:FAINT,'font-size':11,'text-anchor':'middle',
      'dominant-baseline':'central','font-family':'monospace'});
    t.textContent=String(i+1);s.appendChild(t);
  }
  [['ASC',asc,GOLD],['MC',chart['天頂'],COFFEE]].forEach(function(o){
    const p2=px(o[1],R2);
    s.appendChild(E('line',{x1:cx,y1:cy,x2:p2[0],y2:p2[1],stroke:o[2],'stroke-width':1,opacity:.85}));
    const tp=px(o[1],R2-20);
    const t=E('text',{x:tp[0],y:tp[1],fill:o[2],'font-size':11,'text-anchor':'middle',
      'font-family':'monospace','letter-spacing':'.14em'});
    t.textContent=o[0];s.appendChild(t);
  });
  const SYM={太陽:'☉',月亮:'☽',水星:'☿',金星:'♀',火星:'♂',木星:'♃',土星:'♄',
    天王星:'♅',海王星:'♆',冥王星:'♇',北交點:'☊'};
  const COL={太陽:'#C2A059',月亮:'#E8E0CC',水星:'#D4BC85',金星:'#F0E7D2',火星:'#9C6B4A',
    木星:'#C9A96B',土星:'#A89878',天王星:'#C4CBB8',海王星:'#B8C0C4',冥王星:'#9A8E7C',北交點:'#9C7B4E'};
  const items=Object.keys(SYM).map(function(k){return {k,lon:chart[k]};}).sort(function(a,b){return a.lon-b.lon;});
  const placed=[];
  items.forEach(function(it){
    let r=R3-22,clash=true;
    while(clash){
      clash=placed.some(function(p){let d=Math.abs(p.lon-it.lon);if(d>180)d=360-d;
        return d<8&&Math.abs(p.r-r)<20;});
      if(clash)r-=22;
    }
    placed.push({lon:it.lon,r});
    const pp=px(it.lon,r);
    s.appendChild(E('circle',{cx:pp[0],cy:pp[1],r:4.5,fill:COL[it.k],filter:'url(#wg)'}));
    const sp=px(it.lon,r-15);
    const t=E('text',{x:sp[0],y:sp[1],fill:BONE,'font-size':16,'text-anchor':'middle','dominant-baseline':'central'});
    t.textContent=SYM[it.k];s.appendChild(t);
    const m1=px(it.lon,R2-2),m2=px(it.lon,R2-10);
    s.appendChild(E('line',{x1:m1[0],y1:m1[1],x2:m2[0],y2:m2[1],stroke:BONE,'stroke-width':.7,opacity:.6}));
  });
  return s;
}

const VD_POS={11:[0,0],0:[1,0],1:[2,0],2:[3,0],10:[0,1],3:[3,1],9:[0,2],4:[3,2],8:[0,3],7:[1,3],6:[2,3],5:[3,3]};
function drawVedic(vc){
  const W=440,cell=W/4;
  const s=E('svg',{viewBox:'0 0 '+W+' '+W,width:W,role:'img','aria-label':'吠陀星盤'});
  s.appendChild(glowDefs('vg',2));
  const SYM={太陽:'Su',月亮:'Mo',水星:'Me',金星:'Ve',火星:'Ma',木星:'Ju',土星:'Sa',北交點:'Ra',南交點:'Ke'};
  const inSign={};for(let i=0;i<12;i++)inSign[i]=[];
  for(const k in SYM)inSign[Math.floor(vc[k]/30)].push(SYM[k]+' '+Math.floor(vc[k]%30)+'°');
  const ascSign=Math.floor(vc['上升']/30);
  for(const k in VD_POS){
    const i=Number(k),cx=VD_POS[k][0],cy=VD_POS[k][1],x=cx*cell,y=cy*cell,isAsc=i===ascSign;
    s.appendChild(E('rect',{x,y,width:cell,height:cell,fill:isAsc?'rgba(194,160,89,.07)':'none',
      stroke:isAsc?GOLD:FAINT,'stroke-width':isAsc?1.2:.6}));
    const sn=E('text',{x:x+9,y:y+21,fill:isAsc?GOLD:ASH,'font-size':13,
      'font-family':"'Noto Serif TC',serif",'letter-spacing':'.1em'});
    sn.textContent=FateCalc.SIGN_CN[i];s.appendChild(sn);
    if(isAsc){const a=E('text',{x:x+cell-9,y:y+21,fill:GOLD,'font-size':10.5,'text-anchor':'end',
      'font-family':'monospace','letter-spacing':'.14em'});a.textContent='ASC';s.appendChild(a);}
    const arr=inSign[i];
    const sp=arr.length<=4?17:Math.floor((cell-50)/arr.length);
    const fs=arr.length<=4?12.5:arr.length<=5?11.5:10.5;
    arr.forEach(function(tx,k2){
      const t=E('text',{x:x+9,y:y+42+k2*sp,fill:BONE,'font-size':fs,'font-family':'monospace'});
      if(isAsc)t.setAttribute('filter','url(#vg)');
      t.textContent=tx;s.appendChild(t);
    });
  }
  s.appendChild(E('rect',{x:cell,y:cell,width:cell*2,height:cell*2,fill:'none',stroke:FAINT,'stroke-width':.6}));
  const mid=cell*2;
  [['南印度式　恆星黃道',-10,ASH,12],['上升 '+FateCalc.SIGN_CN[ascSign],16,BONE,15]].forEach(function(o){
    const t=E('text',{x:mid,y:mid+o[1],fill:o[2],'font-size':o[3],'text-anchor':'middle',
      'font-family':"'Noto Serif TC',serif",'letter-spacing':'.12em'});
    t.textContent=o[0];s.appendChild(t);
  });
  return s;
}

const HD_GEO={
  Head:{x:200,y:44,w:74,h:54,shape:'tri'},
  Ajna:{x:200,y:124,w:74,h:54,shape:'itri'},
  Throat:{x:200,y:208,w:80,h:62,shape:'rect'},
  G:{x:200,y:314,w:78,h:78,shape:'dia'},
  Heart:{x:292,y:300,w:56,h:46,shape:'trr'},
  Sacral:{x:200,y:418,w:80,h:60,shape:'rect'},
  Spleen:{x:98,y:398,w:60,h:72,shape:'trl'},
  SolarPlexus:{x:302,y:398,w:60,h:72,shape:'trr2'},
  Root:{x:200,y:518,w:84,h:62,shape:'rect'}
};
function centerPath(k){
  const g=HD_GEO[k],x=g.x,y=g.y,w=g.w,h=g.h;
  switch(g.shape){
    case'tri':return 'M'+x+' '+(y-h/2)+'L'+(x+w/2)+' '+(y+h/2)+'L'+(x-w/2)+' '+(y+h/2)+'Z';
    case'itri':return 'M'+(x-w/2)+' '+(y-h/2)+'L'+(x+w/2)+' '+(y-h/2)+'L'+x+' '+(y+h/2)+'Z';
    case'dia':return 'M'+x+' '+(y-h/2)+'L'+(x+w/2)+' '+y+'L'+x+' '+(y+h/2)+'L'+(x-w/2)+' '+y+'Z';
    case'trr':return 'M'+(x-w/2)+' '+(y+h/2)+'L'+(x+w/2)+' '+(y+h/2)+'L'+(x-w/2)+' '+(y-h/2)+'Z';
    case'trl':return 'M'+(x+w/2)+' '+(y-h/2)+'L'+(x+w/2)+' '+(y+h/2)+'L'+(x-w/2)+' '+y+'Z';
    case'trr2':return 'M'+(x-w/2)+' '+(y-h/2)+'L'+(x-w/2)+' '+(y+h/2)+'L'+(x+w/2)+' '+y+'Z';
    default:return 'M'+(x-w/2)+' '+(y-h/2)+'h'+w+'v'+h+'h'+(-w)+'Z';
  }
}
function drawBody(hd){
  const s=E('svg',{viewBox:'0 0 400 580',width:400,role:'img','aria-label':'人類圖'});
  s.appendChild(glowDefs('hg',3));
  const centerOf=function(g){for(const c in FateCalc.CENTERS)if(FateCalc.CENTERS[c].indexOf(g)>=0)return c;};
  hd.channels.forEach(function(ch){
    const ca=centerOf(ch[0]),cb=centerOf(ch[1]);if(ca===cb)return;
    s.appendChild(E('line',{x1:HD_GEO[ca].x,y1:HD_GEO[ca].y,x2:HD_GEO[cb].x,y2:HD_GEO[cb].y,
      stroke:GOLD,'stroke-width':2.6,opacity:.9,'stroke-linecap':'round',filter:'url(#hg)'}));
  });
  for(const k in HD_GEO){
    const on=hd.centers.indexOf(k)>=0,g=HD_GEO[k];
    s.appendChild(E('path',{d:centerPath(k),fill:on?'rgba(194,160,89,.10)':'none',
      stroke:on?GOLD:FAINT,'stroke-width':on?1.4:.8}));
    const t=E('text',{x:g.x,y:g.y+(g.shape==='tri'?12:g.shape==='itri'?-6:4),
      fill:on?BRITE:ASH,'font-size':13.5,'text-anchor':'middle','dominant-baseline':'central',
      'font-family':"'Noto Serif TC',serif",'letter-spacing':'.06em'});
    t.textContent=FateCalc.CENTER_CN[k];s.appendChild(t);
  }
  return s;
}

    +'<tr><th>天體</th><th>星座</th><th>度數</th></tr>'
    +['太陽','月亮','水星','金星','火星','木星','土星','北交點','南交點','上升']
      .map(function(k){return '<tr><td>'+k+'</td><td>'+Interpret.signOf(R.vedic.chart[k])+'</td><td>'+fmtDeg(R.vedic.chart[k])+'</td></tr>';}).join('')
    +'</table></div></div>'));

  const p4=document.getElementById('p4');p4.innerHTML='';
  const hd=R.hd;
  p4.appendChild(h('<div class="chap"><span class="n">人類圖</span><h2>能量圖</h2><p>個性層取出生時刻，設計層取出生前太陽逆行 88 度之時。發光者為已定義的中心與通道。</p></div>'));
  const b4=document.createElement('div');b4.className='chart-box';b4.appendChild(drawBody(hd));p4.appendChild(b4);
  p4.appendChild(h('<div class="card"><h3>核心設定</h3><dl class="kv">'
    +'<dt>類型</dt><dd>'+hd.type+'</dd><dt>內在權威</dt><dd>'+hd.authority+'</dd>'
    +'<dt>人生角色</dt><dd>'+hd.profile+'</dd>'
    +'<dt>已定義中心</dt><dd>'+(hd.centers.map(function(c){return FateCalc.CENTER_CN[c];}).join('、')||'全空白')+'</dd>'
    +'<dt>空白中心</dt><dd>'+(Object.keys(FateCalc.CENTERS).filter(function(c){return hd.centers.indexOf(c)<0;}).map(function(c){return FateCalc.CENTER_CN[c];}).join('、')||'無')+'</dd>'
    +'<dt>通道</dt><dd>'+(hd.channels.map(function(c){return c[0]+'-'+c[1];}).join('　')||'無')+'</dd></dl></div>'));
  p4.appendChild(h('<div class="card"><h3>閘門啟動</h3><div class="tbl-wrap"><table>'
    +'<tr><th>天體</th><th>個性</th><th>設計</th></tr>'
    +FateCalc.HD_BODIES.map(function(b){const cn=b[0];
      return '<tr><td>'+cn+'</td><td>'+hd.personality[cn].gate+'.'+hd.personality[cn].line
        +'</td><td>'+hd.design[cn].gate+'.'+hd.design[cn].line+'</td></tr>';}).join('')
    +'</table></div></div>'));

  document.getElementById('who').textContent=
    birth.y+'/'+String(birth.mo).padStart(2,'0')+'/'+String(birth.d).padStart(2,'0')+' '
    +String(birth.h).padStart(2,'0')+':'+String(birth.mi).padStart(2,'0')+'　'
    +R.bazi.year+' '+R.bazi.month+' '+R.bazi.day+' '+R.bazi.hour;
}

/* ---------- 控制 ---------- */
const citySel=document.getElementById('city');
const tzRow=document.getElementById('tzrow');
citySel.addEventListener('change',function(){
  if(citySel.value==='custom'){tzRow.style.display='flex';return;}
  tzRow.style.display='none';
  const v=citySel.value.split('|');
  document.getElementById('tz').value=v[0];
  document.getElementById('lat').value=v[1];
  document.getElementById('lon').value=v[2];
});

document.getElementById('form').addEventListener('submit',function(e){
  e.preventDefault();
  const err=document.getElementById('err');err.style.display='none';
  const fail=function(m){err.textContent=m;err.style.display='block';};
  const y=Number(document.getElementById('fy').value);
  const mo=Number(document.getElementById('fmo').value);
  const d=Number(document.getElementById('fdd').value);
  if(!(y>=1900&&y<=2099))return fail('出生年請填 1900 到 2099 之間。');
  if(!(mo>=1&&mo<=12))return fail('月份請填 1 到 12。');
  if(!(d>=1&&d<=31))return fail('日期請填 1 到 31。');
  const dim=[31,(y%4===0&&y%100!==0)||y%400===0?29:28,31,30,31,30,31,31,30,31,30,31][mo-1];
  if(d>dim)return fail(y+' 年 '+mo+' 月只有 '+dim+' 天。');
  const hh=Number(document.getElementById('bh').value),mm=Number(document.getElementById('bm').value);
  if(!(hh>=0&&hh<=23))return fail('時請填 0 到 23。');
  if(!(mm>=0&&mm<=59))return fail('分請填 0 到 59。');
  const lat=Number(document.getElementById('lat').value),lon=Number(document.getElementById('lon').value);
  if(!(lat>=-90&&lat<=90))return fail('緯度請填 -90 到 90。');
  if(!(lon>=-180&&lon<=180))return fail('經度請填 -180 到 180。');
  const tz=Number(document.getElementById('tz').value),gd=document.getElementById('gd').value;
  if(!(tz>=-12&&tz<=14))return fail('時區請填 -12 到 14。');
  try{
    const R=FateCalc.computeAll(y,mo,d,hh,mm,lat,lon,tz,gd);
    renderAll(R,{y,mo,d,h:hh,mi:mm,gender:gd});
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='block';
    window.scrollTo(0,0);
    countEvent('chart-generated');
  }catch(ex){
    fail('排盤時發生問題，請確認出生資料是否正確。');
    console.error(ex);
  }
});
document.getElementById('reset').addEventListener('click',function(){
  document.getElementById('app').style.display='none';
  document.getElementById('gate').style.display='flex';
  window.scrollTo(0,0);
});
document.querySelectorAll('.tab').forEach(function(t){
  t.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(function(x){x.setAttribute('aria-selected','false');});
    t.setAttribute('aria-selected','true');
    document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('on');});
    document.getElementById(t.dataset.p).classList.add('on');
    window.scrollTo({top:0,behavior:'smooth'});
    countEvent('tab-'+t.textContent.trim());
  });
});
</script>
</body>
</html>
